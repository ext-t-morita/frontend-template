name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate tokens
        run: pnpm tokens:build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  build-turbopack:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: "pnpm"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm tokens:build
      - run: pnpm build

  build-webpack:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_BUILDER: webpack
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: "pnpm"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm tokens:build
      - run: pnpm build:webpack

  storybook-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: "pnpm"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm tokens:build
      - run: pnpm build-storybook
