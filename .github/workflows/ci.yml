name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate tokens
        run: pnpm tokens:build

      - name: Verify generated token artifacts
        run: git diff --exit-code -- packages/design-tokens/dist/tokens.css

      - name: Lint
        run: pnpm lint

      - name: Framework-aware lint
        run: pnpm lint:framework

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build Storybook
        run: pnpm --filter @repo/web build-storybook

      - name: List Playwright specs
        run: pnpm --filter @repo/web test:e2e:list
