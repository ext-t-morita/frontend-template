pre-commit:
  parallel: true
  commands:
    tokens:
      glob: "packages/design-tokens/src/**/*.{json,ts}"
      run: pnpm tokens:build && git add packages/design-tokens/dist/tokens.css
      stage_fixed: true
    biome:
      glob: "**/*.{ts,tsx}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    prettier:
      glob: "**/*.{css,html,json,md,mjs,yaml,yml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

pre-push:
  commands:
    lint-framework:
      run: pnpm lint:framework
    test:
      run: pnpm test
    build:
      run: pnpm build
